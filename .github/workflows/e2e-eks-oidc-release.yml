name: E2E release gate (eks-oidc template)

on:
  workflow_call:
    inputs:
      pkg-version:
        description: "Package version (from build job)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  e2e-release:
    uses: ./.github/workflows/e2e-eks-oidc-fresh.yml
    with:
      oauth-app-num: "5"
      install-mode: pypi
      pkg-version: ${{ inputs.pkg-version }}
    secrets: inherit
