schema_version: 1
template:
  name: tf-aws-eks-oidc
  engine: terraform
  version: 0.1.0
health:
  active: true
  expected-status-code: 302
  load-balancer-port: 443
requirements:
- name: terraform
- name: awscli
- name: kubectl
values:
- name: deployment_id
  source: output
  source-key: deployment_id
- name: open_url
  source: output
  source-key: get_started_url
- name: aws_region
  source: output
  source-key: region
- name: kubeconfig_path
  source: output
  source-key: kubeconfig_path
- name: workspace_shared_namespace
  source: output
  source-key: workspace_shared_namespace
- name: cluster_name
  source: output
  source-key: cluster_name
- name: cluster_endpoint
  source: output
  source-key: cluster_endpoint
- name: cluster_ca_certificate
  source: output
  source-key: cluster_ca_certificate
- name: workspace_base_url
  source: output
  source-key: workspace_base_url
- name: workspace_patch_start
  source: output
  source-key: workspace_patch_start
- name: workspace_patch_stop
  source: output
  source-key: workspace_patch_stop
- name: server_default_scope
  source: output
  source-key: server_default_scope
- name: workspace_router_namespace
  source: output
  source-key: workspace_router_namespace
- name: workspace_operator_namespace
  source: output
  source-key: workspace_operator_namespace
project-store:
  store-type: s3-only
multi-host: true
multi-server: true
services: []
server-status-rules:
- display: Degraded
  all:
  - path: .status.conditions[type=Degraded].status
    equals: "True"
- display: Starting
  all:
  - path: .status.conditions[type=Progressing].status
    equals: "True"
  - path: .spec.desiredStatus
    equals: Running
- display: Stopping
  all:
  - path: .status.conditions[type=Progressing].status
    equals: "True"
  - path: .spec.desiredStatus
    equals: Stopped
- display: Stopped
  all:
  - path: .status.conditions[type=Stopped].status
    equals: "True"
- display: Running
  all:
  - path: .status.conditions[type=Available].status
    equals: "True"
secrets:
- name: oauth_app_client_secret
  source: output
  source-key: secret_arn
commands:
- cmd: secret.reveal
  sequence:
  - api-name: aws.secretsmanager.get-secret-value
    arguments:
    - api-attribute: secret_id
      source: cli
      source-key: secret-id
  results:
  - result-name: secret-value
    source: result
    source-key: '[0].SecretString'
- cmd: cluster.login
  sequence:
  - api-name: aws.eks.update-kubeconfig
    arguments:
    - api-attribute: cluster_name
      source: output
      source-key: cluster_name
  results:
  - result-name: cluster.login.output
    source: result
    source-key: '[0].Output'
- cmd: cluster.status
  sequence:
  - api-name: aws.eks.describe-cluster
    arguments:
    - api-attribute: cluster_name
      source: output
      source-key: cluster_name
  results:
  - result-name: cluster.status
    source: result
    source-key: '[0].Status'
- cmd: cluster.show
  sequence:
  - api-name: aws.eks.describe-cluster
    arguments:
    - api-attribute: cluster_name
      source: output
      source-key: cluster_name
  results:
  - result-name: cluster.show.name
    source: result
    source-key: '[0].ClusterName'
  - result-name: cluster.show.label
    source: result
    source-key: '[0].Label'
  - result-name: cluster.show.status
    source: result
    source-key: '[0].Status'
  - result-name: cluster.show.endpoint
    source: result
    source-key: '[0].Endpoint'
  - result-name: cluster.show.version
    source: result
    source-key: '[0].Version'
- cmd: cluster.loadbalancer.health
  sequence:
  - api-name: aws.elbv2.describe-load-balancer-health
    arguments:
    - api-attribute: tags
      source: output
      source-key: load_balancer_tags
    - api-attribute: resource_type_filter
      source: literal
      value: "elasticloadbalancing:loadbalancer/net"
  results:
  - result-name: cluster.loadbalancer.health.state
    source: result
    source-key: '[0].State'
  - result-name: cluster.loadbalancer.health.label
    source: result
    source-key: '[0].Label'
  - result-name: cluster.loadbalancer.health.scheme
    source: result
    source-key: '[0].Scheme'
- cmd: host.list
  sequence:
  - api-name: k8s.core.list-nodes
    arguments:
    - api-attribute: query
      source: cli
      source-key: query
    - api-attribute: page_size
      source: cli
      source-key: limit
    - api-attribute: pagination_token
      source: cli
      source-key: continue_from
  results:
  - result-name: host.list
    source: result
    source-key: '[0].NodeNames'
  - result-name: host.list.next_token
    source: result
    source-key: '[0].NextToken'
- cmd: host.status
