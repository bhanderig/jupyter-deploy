schema_version: 1
template:
  name: "some-template-name"
  engine: "terraform"
  version: "0.1.0"
requirements:
  - name: "terraform"
  - name: "awscli"
values:
  - name: "open_url"
    source: "output"
    source-key: "url"
  - name: "aws_region"
    source: "output"
    source-key: "region"
  - name: "server_default_scope"
    source: "output"
    source-key: "server_default_scope"
services:
  - jupyter
  - traefik
  - oauth
commands:
  - cmd: "host.status"
    sequence:
      - api-name: "aws.ec2.describe-instance-status"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
    results:
      - result-name: "host.status"
        source: "result"
        source-key: "[0].InstanceStateName"
  - cmd: "host.stop"
    sequence:
      - api-name: "aws.ec2.stop-instance"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
      - api-name: "aws.ec2.wait-for-stopped"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
  - cmd: "host.start"
    sequence:
      - api-name: "aws.ec2.start-instance"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
      - api-name: "aws.ec2.wait-for-running"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
  - cmd: "host.restart"
    sequence:
      - api-name: "aws.ec2.reboot-instance"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
      - api-name: "aws.ec2.wait-for-running"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
  - cmd: "host.status-for-connection"
    sequence:
      - api-name: "aws.ssm.get-connection-status"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
    results:
      - result-name: "host.status-for-connection"
        source: "result"
        source-key: "[0].Status"
  - cmd: "host.connect"
    sequence:
      - api-name: "aws.ssm.start-session"
        arguments:
          - api-attribute: "target_id"
            source: "output"
            source-key: "instance_id"
  - cmd: "host.exec"
    sequence:
      - api-name: "aws.ssm.wait-default-shell-command-sync"
        arguments:
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "commands"
            source: "cli"
            source-key: "commands"
    results:
      - result-name: "host.exec.stdout"
        source: "result"
        source-key: "[0].StandardOutputContent"
      - result-name: "host.exec.stderr"
        source: "result"
        source-key: "[0].StandardErrorContent"
      - result-name: "host.exec.returncode"
        source: "result"
        source-key: "[0].ResponseCode"
  - cmd: "host.list"
    sequence:
      - api-name: "aws.ec2.describe-instances"
        arguments:
          - api-attribute: "query"
            source: "cli"
            source-key: "query"
          - api-attribute: "page_size"
            source: "cli"
            source-key: "limit"
          - api-attribute: "pagination_token"
            source: "cli"
            source-key: "continue_from"
    results:
      - result-name: "host.list"
        source: "result"
        source-key: "[0].InstanceIds"
      - result-name: "host.list.next_token"
        source: "result"
        source-key: "[0].NextToken"
  - cmd: "host.show"
    sequence:
      - api-name: "aws.ec2.describe-instance"
        arguments:
          - api-attribute: "name"
            source: "cli"
            source-key: "name"
    results:
      - result-name: "host.show.name"
        source: "result"
        source-key: "[0].Name"
      - result-name: "host.show.status"
        source: "result"
        source-key: "[0].Status"
      - result-name: "host.show.resource"
        source: "result"
        source-key: "[0].Resource"
  - cmd: "server.show"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "name"
            source: "cli"
            source-key: "name"
          - api-attribute: "scope"
            source: "cli"
            source-key: "scope"
    results:
      - result-name: "server.show.name"
        source: "result"
        source-key: "[0].Name"
      - result-name: "server.show.resource"
        source: "result"
        source-key: "[0].Resource"
  - cmd: "server.list"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "scope"
            source: "cli"
            source-key: "scope"
          - api-attribute: "page_size"
            source: "cli"
            source-key: "limit"
          - api-attribute: "pagination_token"
            source: "cli"
            source-key: "continue_from"
    results:
      - result-name: "server.list"
        source: "result"
        source-key: "[0].Names"
      - result-name: "server.list.next_token"
        source: "result"
        source-key: "[0].NextToken"
  - cmd: "server.status"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
    results:
      - result-name: "server.status"
        source: "result"
        source-key: "[0].StandardOutputContent"
  - cmd: "server.start"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "action"
            source: "cli"
            source-key: "action"
          - api-attribute: "service"
            source: "cli"
            source-key: "service"
  - cmd: "server.stop"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "action"
            source: "cli"
            source-key: "action"
          - api-attribute: "service"
            source: "cli"
            source-key: "service"
  - cmd: "server.restart"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "action"
            source: "cli"
            source-key: "action"
          - api-attribute: "service"
            source: "cli"
            source-key: "service"
  - cmd: server.logs
    sequence:
      - api-name: aws.ssm.wait-command-sync
        arguments:
          - api-attribute: document_name
            source: output
            source-key: server_logs_document
          - api-attribute: instance_id
            source: output
            source-key: instance_id
          - api-attribute: service
            source: cli
            source-key: service
          - api-attribute: extra
            source: cli
            source-key: extra
    results:
      - result-name: server.logs
        source: result
        source-key: '[0].StandardOutputContent'
      - result-name: server.errors
        source: result
        source-key: '[0].StandardErrorContent'
  - cmd: "server.exec"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "server_exec_document"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "service"
            source: "cli"
            source-key: "service"
          - api-attribute: "commands"
            source: "cli"
            source-key: "commands"
    results:
      - result-name: "server.exec.stdout"
        source: "result"
        source-key: "[0].StandardOutputContent"
      - result-name: "server.exec.stderr"
        source: "result"
        source-key: "[0].StandardErrorContent"
      - result-name: "server.exec.returncode"
        source: "result"
        source-key: "[0].ResponseCode"
  - cmd: "users.add"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "users"
            source: "cli"
            source-key: "users"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "usernames_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "users.remove"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "users"
            source: "cli"
            source-key: "users"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "usernames_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "users.set"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "users"
            source: "cli"
            source-key: "users"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "usernames_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "users.list"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    results:
      - result-name: "users.list"
        source: "result"
        source-key: "[0].StandardOutputContent"
        transform: "comma-separated-str-to-list-str"
  - cmd: "teams.add"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "teams"
            source: "cli"
            source-key: "teams"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "teamnames_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "teams.remove"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "teams"
            source: "cli"
            source-key: "teams"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "teamnames_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "teams.set"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "teams"
            source: "cli"
            source-key: "teams"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "teamnames_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "teams.list"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    results:
      - result-name: "teams.list"
        source: "result"
        source-key: "[0].StandardOutputContent"
        transform: "comma-separated-str-to-list-str"
  - cmd: "organization.set"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "organization"
            source: "cli"
            source-key: "organization"
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "organization_varname"
        source: "result"
        source-key: "[1].StandardOutputContent"
  - cmd: "organization.unset"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    updates:
      - variable-name: "organization_varname"
        source: "result"
        source-key: "[0].StandardOutputContent"
  - cmd: "secret.reveal"
    sequence:
      - api-name: "aws.secretsmanager.get-secret-value"
        arguments:
          - api-attribute: "secret-id"
            source: "cli"
            source-key: "secret-id"
    results:
      - result-name: "secret-value"
        source: "result"
        source-key: "[0].SecretString"
  - cmd: "organization.get"
    sequence:
      - api-name: "aws.ssm.wait-command-sync"
        arguments:
          - api-attribute: "document_name"
            source: "output"
            source-key: "jd_cmd_doc_name"
          - api-attribute: "instance_id"
            source: "output"
            source-key: "instance_id"
          - api-attribute: "category"
            source: "cli"
            source-key: "category"
    results:
      - result-name: "organization.get"
        source: "result"
        source-key: "[0].StandardOutputContent"
  - cmd: "open.server"
    sequence:
      - api-name: "k8s.custom.get"
        arguments:
          - api-attribute: "group"
            source: "output"
            source-key: "workspace_crd_group"
          - api-attribute: "version"
            source: "output"
            source-key: "workspace_crd_version"
          - api-attribute: "plural"
            source: "output"
            source-key: "workspace_crd_plural"
          - api-attribute: "scope"
            source: "cli"
            source-key: "scope"
          - api-attribute: "name"
            source: "cli"
            source-key: "name"
    results:
      - result-name: "open.server.url"
        source: "result"
        source-key: "[0].Resource"
        extract: "status.accessURL"
secrets:
  - name: oauth_app_client_secret
    source: output
    source-key: secret_arn
  - name: another_secret
    source: output
    source-key: another_secret_arn
supervised-execution:
  config:
    config.terraform-init:
      default-phase:
        label: "Configuring terraform dependencies"
        progress-pattern: "Initializing"
        progress-events-estimate: 5
    config.terraform-plan:
      default-phase:
        label: "Generating plan"
        progress-pattern: "(Read complete after|Refreshing state)"
        progress-events-estimate: 15
  up:
    up.terraform-apply:
      default-phase:
        label: "Mutating resources"
        progress-pattern: "(Creation complete after|Modifications complete after|Destruction complete after)"
        progress-events-estimate-dynamic-source: "plan.to_mutate"
      phases:
        - enter-pattern: "null_resource.wait_for_instance_ready: Creating"
          exit-pattern: "null_resource.wait_for_instance_ready: Creation complete"
          label: "Configuring EC2 instance"
          weight: 40
          phases:
            - enter-pattern: "Waiting for SSM agent"
              label: "Waiting for SSM agent"
              weight: 10
            - enter-pattern: "Cloudinit script is running"
              label: "Configuring EC2 instance"
              weight: 50
            - enter-pattern: "Checking instance status"
              label: "Checking instance status"
              weight: 20
            - enter-pattern: "fetching TLS certificates"
              label: "Getting TLS certificates"
              weight: 20
  down:
    down.terraform-destroy:
      default-phase:
        label: "Evaluating resources to destroy"
        progress-pattern: "(Read complete after|Refreshing state\\.\\.\\.\\[id=)"
        progress-events-estimate: 50
      phases:
        - enter-pattern: "Plan: \\d+ to add, \\d+ to change, (\\d+) to destroy\\."
          progress-events-estimate-capture-group: 1
          progress-pattern: "Destruction complete after"
          label: "Destroying resources"
          weight: 100
