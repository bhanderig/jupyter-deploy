    arguments:
    - api-attribute: tags
      source: output
      source-key: load_balancer_tags
    - api-attribute: resource_type_filter
      source: literal
      value: "elasticloadbalancing:loadbalancer/net"
  results:
  - result-name: cluster.loadbalancer.health.state
    source: result
    source-key: '[0].State'
  - result-name: cluster.loadbalancer.health.label
