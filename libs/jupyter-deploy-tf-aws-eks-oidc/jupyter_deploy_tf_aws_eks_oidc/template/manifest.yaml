supervised-execution:
  config:
    config.terraform-plan:
      default-phase:
        label: Reading data sources
        progress-pattern: (Read complete after|Refreshing state)
        progress-events-estimate: 120
  up:
    up.terraform-apply:
      phases:
      - enter-pattern: '(module\.|aws_eks_(addon|pod_identity)|time_sleep|null_resource\.build)'
        exit-pattern: 'helm_release\.(traefik_crds|jupyter_k8s|workspace_router)'
        label: Creating infrastructure
        weight: 55
        progress-pattern: '(Creation complete|Still creating)'
        progress-events-estimate: 120
        phases:
        - enter-pattern: 'module\.vpc'
          label: Creating VPC
          weight: 5
        - enter-pattern: 'null_resource\.build_trigger'
          label: Building application image
          weight: 5
        - enter-pattern: 'module\.eks_cluster\.aws_eks_cluster'
          label: Creating EKS cluster
          weight: 50
        - enter-pattern: '(module\.node_group|aws_eks_addon|time_sleep)'
          label: Provisioning nodes and add-ons
          weight: 40
      - enter-pattern: 'helm_release\.(traefik_crds|jupyter_k8s|workspace_router)'
        exit-pattern: 'helm_release\.workspace_router.*(Creation|Modifications) complete'
        label: Deploying platform
        weight: 10
        progress-pattern: 'helm_release\.\w+.*(Creation|Modifications) complete'
        progress-events-estimate: 4
      - enter-pattern: '(aws_eks_identity_provider_config|null_resource\.wait_for_routing_ready)'
        exit-pattern: 'null_resource\.wait_for_routing_ready.*Creation complete'
        label: Waiting for routing readiness
        weight: 25
        progress-pattern: '(Still creating|local-exec)'
        progress-events-estimate: 60
        phases:
        - enter-pattern: 'aws_eks_identity_provider_config'
          label: Registering OIDC provider
          weight: 40
        - enter-pattern: 'null_resource\.wait_for_routing_ready'
          label: Verifying routing health
          weight: 60
      - enter-pattern: 'helm_release\.(workspace_defaults|github_rbac)'
        exit-pattern: 'helm_release\.(workspace_defaults|github_rbac).*(Creation|Modifications) complete'
        label: Creating workspace defaults
        weight: 10
        progress-pattern: '(Creation|Modifications) complete'
        progress-events-estimate: 3
