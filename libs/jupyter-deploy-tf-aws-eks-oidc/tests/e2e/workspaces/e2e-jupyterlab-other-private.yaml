apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: e2e-jupyterlab-other-private
  namespace: default
spec:
  displayName: "E2E JupyterLab Other User Private"
  desiredStatus: Running
  ownershipType: OwnerOnly
  accessType: OwnerOnly
  # Long-lived seeded workspace — 6h idle timeout so it survives the session.
  # See e2e-jupyterlab-admin-public.yaml for the full rationale (jupyter-k8s#415).
  idleShutdown:
    enabled: true
    idleTimeoutInMinutes: 360
    detection:
      httpGet:
        path: /api/status
        port: 8888
        transport: network
        lastActivityTimestamp:
          responseBodyPath: last_activity
          format: RFC3339
