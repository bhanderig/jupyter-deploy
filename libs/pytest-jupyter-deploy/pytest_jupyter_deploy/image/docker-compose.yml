services:
  e2e:
    build:
      context: .
      dockerfile: ${E2E_DOCKERFILE:-Dockerfile}
      args:
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    image: ${E2E_IMAGE:-jupyter-deploy-e2e:latest}
    container_name: jupyter-deploy-e2e
    # Required for X11 forwarding: .Xauthority cookies are hostname-specific
    hostname: ${HOSTNAME:-localhost}
    working_dir: /workspace
    # User is set in Dockerfile based on build args
    volumes:
      # Mount .auth directory to persist authentication state
      - ./.auth:/workspace/.auth
      # Mount AWS credentials (read-only) - accessible by testuser
      - ~/.aws:/home/testuser/.aws:ro
      # Mount kube config (read-only) - needed for kubectl commands
      - ~/.kube:/home/testuser/.kube:ro
      # Mount X11 socket for GUI applications
      - /tmp/.X11-unix:/tmp/.X11-unix
      # Project directory will be mounted dynamically via override file in justfile
    env_file:
      - ./.env
    environment:
      - DISPLAY=${DISPLAY}
      # AWS credential passthrough for CI (OIDC session credentials)
      # Empty defaults are safe: the SDK ignores them and falls back to ~/.aws/config
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      # AWS_REGION must be set to a real value — the SDK treats "" as a valid but
      # broken region instead of falling back to ~/.aws/config. The justfile resolves
      # this from `aws configure get region` and writes it to .env.
      - AWS_REGION=${AWS_REGION}
      # Bare passthrough: set in container only if defined on host. Do NOT default
      # to "default" — boto3 raises ProfileNotFound when AWS_PROFILE is explicitly
      # set but ~/.aws/config doesn't exist (e.g. CI runners). When unset, boto3
      # falls back to the default profile gracefully or uses env var credentials.
      - AWS_PROFILE
      - AWS_CONFIG_FILE=/home/testuser/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/home/testuser/.aws/credentials
    network_mode: host
    # Keep container running in background
    command: sleep infinity
