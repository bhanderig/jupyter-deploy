schema_version: 1
template:
  name: tf-aws-eks-oidc
  engine: terraform
  version: 0.1.0
requirements:
- name: terraform
- name: awscli
- name: kubectl
values:
- name: deployment_id
  source: output
  source-key: deployment_id
- name: open_url
  source: output
  source-key: get_started_url
- name: aws_region
  source: output
  source-key: region
- name: kubeconfig_path
  source: output
  source-key: kubeconfig_path
- name: workspace_shared_namespace
  source: output
  source-key: workspace_shared_namespace
- name: cluster_name
  source: output
  source-key: cluster_name
- name: cluster_endpoint
  source: output
  source-key: cluster_endpoint
- name: cluster_ca_certificate
  source: output
  source-key: cluster_ca_certificate
- name: workspace_base_url
  source: output
  source-key: workspace_base_url
- name: workspace_patch_start
  source: output
  source-key: workspace_patch_start
- name: workspace_patch_stop
  source: output
  source-key: workspace_patch_stop
- name: server_default_scope
  source: output
  source-key: server_default_scope
- name: workspace_router_namespace
  source: output
  source-key: workspace_router_namespace
- name: workspace_operator_namespace
  source: output
  source-key: workspace_operator_namespace
project-store:
  store-type: s3-only
multi-host: true
multi-server: true
services: []
server-status-rules:
- display: Degraded
  all:
  - path: .status.conditions[type=Degraded].status
    equals: "True"
- display: Starting
  all:
  - path: .status.conditions[type=Progressing].status
    equals: "True"
  - path: .spec.desiredStatus
    equals: Running
- display: Stopping
  all:
  - path: .status.conditions[type=Progressing].status
    equals: "True"
  - path: .spec.desiredStatus
    equals: Stopped
- display: Stopped
  all:
  - path: .status.conditions[type=Stopped].status
    equals: "True"
- display: Running
  all:
  - path: .status.conditions[type=Available].status
    equals: "True"
secrets:
- name: oauth_app_client_secret
  source: output
  source-key: secret_arn
commands:
- cmd: secret.reveal
  sequence:
  - api-name: aws.secretsmanager.get-secret-value
    arguments:
    - api-attribute: secret_id
      source: cli
      source-key: secret-id
  results:
  - result-name: secret-value
    source: result
    source-key: '[0].SecretString'
- cmd: host.list
  sequence:
  - api-name: k8s.core.list-nodes
    arguments:
    - api-attribute: query
      source: cli
      source-key: query
    - api-attribute: page_size
      source: cli
      source-key: limit
    - api-attribute: pagination_token
      source: cli
      source-key: continue_from
  results:
  - result-name: host.list
    source: result
    source-key: '[0].NodeNames'
  - result-name: host.list.next_token
    source: result
    source-key: '[0].NextToken'
- cmd: host.status
  sequence:
  - api-name: k8s.core.get-node
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
  results:
  - result-name: host.status
    source: result
    source-key: '[0].Status'
- cmd: host.show
  sequence:
  - api-name: k8s.core.get-node
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
  results:
  - result-name: host.show.name
    source: result
    source-key: '[0].Name'
  - result-name: host.show.status
    source: result
    source-key: '[0].Status'
  - result-name: host.show.resource
    source: result
    source-key: '[0].Resource'
- cmd: server.list
  sequence:
  - api-name: k8s.custom.list
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: page_size
      source: cli
      source-key: limit
    - api-attribute: pagination_token
      source: cli
      source-key: continue_from
  results:
  - result-name: server.list
    source: result
    source-key: '[0].Names'
  - result-name: server.list.items
    source: result
    source-key: '[0].Items'
  - result-name: server.list.next_token
    source: result
    source-key: '[0].NextToken'
- cmd: server.status
  sequence:
  - api-name: k8s.custom.get
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
  results:
  - result-name: server.status
    source: result
    source-key: '[0].Name'
  - result-name: server.status.resource
    source: result
    source-key: '[0].Resource'
- cmd: server.show
  sequence:
  - api-name: k8s.custom.get
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
  results:
  - result-name: server.show.name
    source: result
    source-key: '[0].Name'
  - result-name: server.show.resource
    source: result
    source-key: '[0].Resource'
- cmd: server.start
  sequence:
  - api-name: k8s.custom.patch
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: body
      source: output
      source-key: workspace_patch_start
- cmd: server.stop
  sequence:
  - api-name: k8s.custom.patch
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: body
      source: output
      source-key: workspace_patch_stop
- cmd: server.logs
  sequence:
  - api-name: k8s.custom.get
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
  - api-name: k8s.core.deployment-logs
    arguments:
    - api-attribute: name
      source: result
      source-key: '[0].Resource'
      extract: status.deploymentName
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: container
      source: cli
      source-key: service
    - api-attribute: extra
      source: cli
      source-key: extra
  results:
  - result-name: server.logs
    source: result
    source-key: '[1].Logs'
  - result-name: server.errors
    source: result
    source-key: '[1].Logs'
- cmd: server.exec
  sequence:
  - api-name: k8s.custom.get
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
  - api-name: k8s.core.exec-pod
    arguments:
    - api-attribute: deployment_name
      source: result
      source-key: '[0].Resource'
      extract: status.deploymentName
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: command
      source: cli
      source-key: commands
    - api-attribute: container
      source: cli
      source-key: service
  results:
  - result-name: server.exec.stdout
    source: result
    source-key: '[1].Stdout'
  - result-name: server.exec.stderr
    source: result
    source-key: '[1].Stderr'
  - result-name: server.exec.returncode
    source: result
    source-key: '[1].ReturnCode'
- cmd: open.server
  sequence:
  - api-name: k8s.custom.get
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
  results:
  - result-name: open.server.url
    source: result
    source-key: '[0].Resource'
    extract: status.accessURL
- cmd: server.connect
  sequence:
  - api-name: k8s.custom.get
    arguments:
    - api-attribute: group
      source: output
      source-key: workspace_crd_group
    - api-attribute: version
      source: output
      source-key: workspace_crd_version
    - api-attribute: plural
      source: output
      source-key: workspace_crd_plural
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: name
      source: cli
      source-key: name
  - api-name: k8s.core.exec-pod-interactive
    arguments:
    - api-attribute: deployment_name
      source: result
      source-key: '[0].Resource'
      extract: status.deploymentName
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: container
      source: cli
      source-key: service
- cmd: component.deployment.status
  sequence:
  - api-name: k8s.apps.get-deployment-status
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
  results:
  - result-name: component.deployment.status.status
    source: result
    source-key: '[0].Status'
  - result-name: component.deployment.status.status_category
    source: result
    source-key: '[0].StatusCategory'
  - result-name: component.deployment.status.details
    source: result
    source-key: '[0].Details'
  - result-name: component.deployment.status.sub_component
    source: result
    source-key: '[0].SubComponent'
- cmd: component.deployment.show
  sequence:
  - api-name: k8s.apps.get-deployment
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
  results:
  - result-name: component.deployment.show.name
    source: result
    source-key: '[0].Name'
  - result-name: component.deployment.show.resource
    source: result
    source-key: '[0].Resource'
- cmd: component.deployment.logs
  sequence:
  - api-name: k8s.core.deployment-logs
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: extra
      source: cli
      source-key: extra
  results:
  - result-name: component.deployment.logs.logs
    source: result
    source-key: '[0].Logs'
- cmd: component.deployment.restart
  sequence:
  - api-name: k8s.apps.rollout-restart
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
- cmd: component.cronjob.status
  sequence:
  - api-name: k8s.batch.get-cronjob-status
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: query
      source: cli
      source-key: query
  results:
  - result-name: component.cronjob.status.status
    source: result
    source-key: '[0].Status'
  - result-name: component.cronjob.status.status_category
    source: result
    source-key: '[0].StatusCategory'
  - result-name: component.cronjob.status.details
    source: result
    source-key: '[0].Details'
  - result-name: component.cronjob.status.sub_component
    source: result
    source-key: '[0].SubComponent'
- cmd: component.cronjob.show
  sequence:
  - api-name: k8s.batch.get-cronjob
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
  results:
  - result-name: component.cronjob.show.name
    source: result
    source-key: '[0].Name'
  - result-name: component.cronjob.show.resource
    source: result
    source-key: '[0].Resource'
- cmd: component.cronjob.logs
  sequence:
  - api-name: k8s.batch.get-job-logs
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
    - api-attribute: query
      source: cli
      source-key: query
    - api-attribute: extra
      source: cli
      source-key: extra
  results:
  - result-name: component.cronjob.logs.logs
    source: result
    source-key: '[0].Logs'
- cmd: component.cronjob.trigger
  sequence:
  - api-name: k8s.batch.create-job-from-cronjob
    arguments:
    - api-attribute: name
      source: cli
      source-key: name
    - api-attribute: scope
      source: cli
      source-key: scope
  results:
  - result-name: component.cronjob.trigger.job_name
    source: result
    source-key: '[0].JobName'
components:
  traefik:
    type: Deployment
    description: Ingress controller and reverse proxy
    scope: workspace_router_namespace
    verbs:
      status:
        method: k8s.apps.get-deployment-status
      show:
        method: k8s.apps.get-deployment
      logs:
        method: k8s.core.deployment-logs
      restart:
        method: k8s.apps.rollout-restart
  dex:
    type: Deployment
    description: OIDC identity provider
    scope: workspace_router_namespace
    verbs:
      status:
        method: k8s.apps.get-deployment-status
      show:
        method: k8s.apps.get-deployment
      logs:
        method: k8s.core.deployment-logs
      restart:
        method: k8s.apps.rollout-restart
  oauth2-proxy:
    type: Deployment
    description: OAuth2 authentication proxy
    scope: workspace_router_namespace
    verbs:
      status:
        method: k8s.apps.get-deployment-status
      show:
        method: k8s.apps.get-deployment
      logs:
        method: k8s.core.deployment-logs
      restart:
        method: k8s.apps.rollout-restart
  authmiddleware:
    type: Deployment
    description: JWT validation and session management
    scope: workspace_router_namespace
    verbs:
      status:
        method: k8s.apps.get-deployment-status
      show:
        method: k8s.apps.get-deployment
      logs:
        method: k8s.core.deployment-logs
      restart:
        method: k8s.apps.rollout-restart
  console:
    type: Deployment
    description: Web console for workspace management
    scope: workspace_router_namespace
    verbs:
      status:
        method: k8s.apps.get-deployment-status
      show:
        method: k8s.apps.get-deployment
      logs:
        method: k8s.core.deployment-logs
      restart:
        method: k8s.apps.rollout-restart
  workspace-operator:
    type: Deployment
    description: Workspace lifecycle controller
    resource-name: jupyter-k8s-controller-manager
    scope: workspace_operator_namespace
    verbs:
      status:
        method: k8s.apps.get-deployment-status
      show:
        method: k8s.apps.get-deployment
      logs:
        method: k8s.core.deployment-logs
      restart:
        method: k8s.apps.rollout-restart
  jwt-rotator:
    type: CronJob
    description: Periodic JWT signing key rotation
    scope: workspace_router_namespace
    query: "app=jwt-rotator"
    verbs:
      status:
        method: k8s.batch.get-cronjob-status
      show:
        method: k8s.batch.get-cronjob
      logs:
        method: k8s.batch.get-job-logs
      trigger:
        method: k8s.batch.create-job-from-cronjob
supervised-execution:
  config:
    config.terraform-plan:
      default-phase:
        label: Reading data sources
        progress-pattern: (Read complete after|Refreshing state)
        progress-events-estimate: 120
  up:
    up.terraform-apply:
      phases:
      - enter-pattern: 'module.vpc'
        exit-pattern: 'module.vpc.*Creation complete'
        label: Creating VPC
        weight: 5
      - enter-pattern: 'module.eks_cluster'
        exit-pattern: 'module.eks_cluster.*Creation complete'
        label: Creating EKS cluster
        weight: 40
      - enter-pattern: 'aws_eks_addon'
        exit-pattern: 'aws_eks_addon.*Creation complete'
        label: Installing EKS add-ons
        weight: 20
      - enter-pattern: 'helm_release.jupyter_k8s'
        exit-pattern: 'helm_release.jupyter_k8s.*Creation complete'
        label: Deploying Jupyter K8s operator
        weight: 10
      - enter-pattern: 'helm_release.workspace_router'
        exit-pattern: 'helm_release.workspace_router.*Creation complete'
        label: Deploying OIDC routing
        weight: 15
      - enter-pattern: 'null_resource.wait_for_routing_ready'
        exit-pattern: 'null_resource.wait_for_routing_ready.*Creation complete'
        label: Waiting for routing to be ready
        weight: 10
      - enter-pattern: 'helm_release.workspace_defaults'
        exit-pattern: 'helm_release.workspace_defaults.*Creation complete'
        label: Creating workspace defaults
        weight: 5
