schema_version: 1
template:
  name: tf-aws-eks-oidc
  engine: terraform
  version: 0.1.3
health:
  active: true
  expected-status-code: 302
  load-balancer-port: 443
requirements:
- name: terraform
- name: awscli
- name: kubectl
- name: yq
- name: helm
values:
- name: deployment_id
  source: output
  source-key: deployment_id
- name: open_url
  source: output
  source-key: get_started_url
- name: aws_region
  source: output
  source-key: region
- name: kubeconfig_path
  source: output
  source-key: kubeconfig_path
- name: cluster_name
  source: output
  source-key: cluster_name
- name: cluster_endpoint
  source: output
  source-key: cluster_endpoint
- name: cluster_ca_certificate
  source: output
  source-key: cluster_ca_certificate
- name: server_default_scope
  source: output
  source-key: server_default_scope
project-store:
  store-type: s3-only
multi-host: true
multi-server: true
services: []
server-status-rules:
- display: Degraded
  all:
  - path: .status.conditions[type=Degraded].status
    equals: "True"
- display: Starting
  all:
  - path: .status.conditions[type=Progressing].status
    equals: "True"
  - path: .spec.desiredStatus
    equals: Running
- display: Stopping
  all:
  - path: .status.conditions[type=Progressing].status
    equals: "True"
  - path: .spec.desiredStatus
    equals: Stopped
- display: Stopped
  all:
  - path: .status.conditions[type=Stopped].status
    equals: "True"
- display: Running
  all:
  - path: .status.conditions[type=Available].status
    equals: "True"
images:
  jupyterlab:
    description: JupyterLab workspace image
    repository-output: jupyterlab_ecr_repository_name
    tag-output: jupyterlab_image_tag
secrets:
- name: oauth_app_client_secret
  source: output
  source-key: secret_arn
commands:
- cmd: secret.reveal
  sequence:
  - api-name: aws.secretsmanager.get-secret-value
    arguments:
    - api-attribute: secret_id
      source: cli
      source-key: secret-id
  results:
  - result-name: secret-value
    source: result
    source-key: '[0].SecretString'
- cmd: cluster.login
  sequence:
  - api-name: aws.eks.update-kubeconfig
    arguments:
    - api-attribute: cluster_name
      source: output
      source-key: cluster_name
  results:
  - result-name: cluster.login.output
    source: result
    source-key: '[0].Output'
- cmd: cluster.status
  sequence:
  - api-name: aws.eks.describe-cluster
    arguments:
    - api-attribute: cluster_name
      source: output
      source-key: cluster_name
  results:
  - result-name: cluster.status
    source: result
    source-key: '[0].Status'
- cmd: cluster.show
  sequence:
  - api-name: aws.eks.describe-cluster
    arguments:
    - api-attribute: cluster_name
      source: output
      source-key: cluster_name
  results:
  - result-name: cluster.show.name
    source: result
    source-key: '[0].ClusterName'
  - result-name: cluster.show.label
    source: result
    source-key: '[0].Label'
  - result-name: cluster.show.status
    source: result
    source-key: '[0].Status'
  - result-name: cluster.show.endpoint
