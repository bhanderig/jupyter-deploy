# Template for canary E2E testing of the eks-oidc template.
# All packages installed from prod PyPI — no version pins, no placeholders.
# The solver picks the latest compatible versions, same as a user running `pip install`.
[project]
name = "e2e-eks-oidc-canary"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "jupyter-deploy[aws,k8s]",
    "jupyter-deploy-tf-aws-eks-oidc",
    "pytest-jupyter-deploy[ui]",
    "pytest-cov",
]
