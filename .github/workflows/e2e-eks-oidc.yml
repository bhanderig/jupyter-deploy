name: E2E EKS OIDC template

on:
  workflow_dispatch:
    inputs:
      oauth-app-num:
        description: "OAuth app number (4-6) — determines subdomain"
        required: false
        type: choice
        options: ["4", "5", "6"]
        default: "4"
      test-filter:
        description: "Pytest -k filter (applied to all jobs, empty = all tests)"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to checkout (e.g. refs/pull/185/merge for a fork PR)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

concurrency:
  group: e2e-eks-${{ inputs.oauth-app-num }}
  cancel-in-progress: false

jobs:
  build-image:
    name: "Build E2E image"
    uses: ./.github/workflows/e2e-build-image.yml
    secrets: inherit
    with:
      oauth-app-num: ${{ inputs.oauth-app-num }}
      ref: ${{ inputs.ref }}

  test-non-mutating:
    name: "Non-mutating tests"
    needs: build-image
    uses: ./.github/workflows/e2e-eks-oidc-job.yml
    secrets: inherit
    with:
      oauth-app-num: ${{ inputs.oauth-app-num }}
      test-filter: ${{ inputs.test-filter }}
      ref: ${{ inputs.ref }}
      ecr-tag: ${{ needs.build-image.outputs.ecr-tag }}
      timeout-minutes: 120

  # All mutating EKS tests, selected by the `mutating` marker so new ones (GPU,
  # autoscaling, …) are picked up without editing this workflow. Some require the
  # deployment to be configured a certain way (e.g. idle shutdown needs
  # workspaces_idle_shutdown_timeout_min=1, set in tests/e2e/configurations/base.yaml);
  # a restored sandbox deployed with an older config may fail those.
  test-mutating:
    name: "Mutating tests"
    needs: [build-image, test-non-mutating]
    uses: ./.github/workflows/e2e-eks-oidc-job.yml
    secrets: inherit
    with:
      oauth-app-num: ${{ inputs.oauth-app-num }}
      test-filter: ${{ inputs.test-filter }}
      ref: ${{ inputs.ref }}
      ecr-tag: ${{ needs.build-image.outputs.ecr-tag }}
      marker: mutating
      mutate: true
      timeout-minutes: 60
