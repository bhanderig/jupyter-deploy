# EC2NodeClasses define the AWS-level node configuration for Karpenter.
# One class per pool (routing + each workspace pool).
# All pools pin httpPutResponseHopLimit: 1 — no routing or workspace pod needs
# IMDS: cert-manager/external-dns use Pod Identity, and traefik/dex/oauth2-proxy/
# authmiddleware/web-app make no AWS calls. Hop 1 blocks containerized pods from
# reaching IMDS to assume the node role; node agents (CNI, EBS CSI) use
# hostNetwork and reach IMDS at hop 1, so they are unaffected.
# Both pin httpTokens: required (IMDSv2).
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: routing
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  instanceProfile: {{ .Values.nodeInstanceProfile | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  tags:
    karpenter.sh/cluster-name: {{ .Values.clusterName | quote }}
  metadataOptions:
    httpPutResponseHopLimit: 1
    httpEndpoint: enabled
    httpTokens: required
    httpProtocolIPv6: disabled
  blockDeviceMappings:
    - deviceName: {{ .Values.routing.blockDevice.deviceName }}
      ebs:
        volumeSize: {{ .Values.routing.blockDevice.volumeSizeGi }}Gi
        volumeType: {{ .Values.routing.blockDevice.volumeType }}
        encrypted: true
        deleteOnTermination: true
{{- range .Values.workspaceNodepools }}
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .name }}
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  instanceProfile: {{ $.Values.nodeInstanceProfile | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $.Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $.Values.clusterName | quote }}
  tags:
    karpenter.sh/cluster-name: {{ $.Values.clusterName | quote }}
  metadataOptions:
    httpPutResponseHopLimit: 1
    httpEndpoint: enabled
    httpTokens: required
    httpProtocolIPv6: disabled
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        # Root volume: OS + container image cache. User data (notebooks, files)
        # lives on the EBS volume mounted by the workspace pod via StorageClass.
        # Override disk_size_gb in workspace_nodepools for large custom images.
        volumeSize: {{ .diskSizeGi }}Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
{{- end }}
