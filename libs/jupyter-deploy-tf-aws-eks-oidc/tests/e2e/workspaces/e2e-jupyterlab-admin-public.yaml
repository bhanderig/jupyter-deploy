apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: e2e-jupyterlab-admin-public
  namespace: default
spec:
  displayName: "E2E JupyterLab Admin Public"
  desiredStatus: Running
  ownershipType: Public
  accessType: Public
  # Long-lived seeded workspace: it stays idle for the whole test session while
  # the fast_idle_operator fixture speeds up the operator poll interval, so the
  # template default timeout would stop it mid-test. Use a 6h timeout instead.
  # detection.httpGet must be repeated because setting any idleShutdown field
  # replaces the template's defaultIdleShutdown wholesale (jupyter-k8s#415).
  idleShutdown:
    enabled: true
    idleTimeoutInMinutes: 360
    detection:
      httpGet:
        path: /api/status
        port: 8888
        transport: network
        lastActivityTimestamp:
          responseBodyPath: last_activity
          format: RFC3339
